<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MIRAI — Gallery</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp.min.css');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Pretendard JP','Pretendard Variable',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:#0f0f10;color:#f7f7f8;overflow:hidden;
}

/* ═══ DESIGN TOKENS (MIRAI Dark Mode) ═══ */
:root{
  --primary-normal:#14c391;
  --primary-strong:#14c092;
  --primary-heavy:#13bb8f;
  --label-normal:#f7f7f8;
  --label-strong:#ffffff;
  --label-neutral:rgba(194,196,200,0.88);
  --label-alternative:rgba(174,176,182,0.61);
  --label-assistive:rgba(174,176,182,0.28);
  --label-disable:rgba(152,155,162,0.16);
  --bg-normal:#1b1c1e;
  --bg-alternative:#0f0f10;
  --bg-elevated:#1b1c1e;
  --line-normal:rgba(112,115,124,0.32);
  --line-alternative:rgba(112,115,124,0.22);
  --fill-normal:rgba(112,115,124,0.22);
  --fill-strong:rgba(112,115,124,0.28);
  --fill-alternative:rgba(112,115,124,0.12);
  --material-dimmer:rgba(0,0,0,0.6);
  --accent-pink:#FA73E3;
  --accent-violet:#7C5EF7;
  --accent-cyan:#28D0ED;
  --accent-lime:#6BE016;
  --accent-purple:#D478FF;
}

.screen{
  width:100%;max-width:430px;height:100vh;height:100dvh;
  margin:0 auto;position:relative;overflow:hidden;
  background:var(--bg-alternative);
  display:flex;flex-direction:column;
}
/* Tablet+ */
@media (min-width:431px){
  .screen{max-width:696px}
  .gallery-body{padding:0 24px 80px;gap:18px}
}
/* Desktop */
@media (min-width:1024px){
  .screen{max-width:940px}
  .gallery-body{padding:0 32px 100px;gap:22px}
  .gallery-title{font-size:18px}
  .progress-card{padding:20px}
}

/* ═══ HEADER ═══ */
.gallery-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:max(12px, env(safe-area-inset-top));
  flex-shrink:0;position:relative;z-index:5;
}
.gallery-title{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  padding-top:max(0px, env(safe-area-inset-top));
  font-size:17px;font-weight:600;color:var(--label-strong);
}
.gallery-close,.gallery-back{
  width:36px;height:36px;border-radius:50%;border:none;
  background:transparent;color:var(--label-normal);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.gallery-close:active,.gallery-back:active{background:rgba(255,255,255,0.08)}
.gallery-back{visibility:hidden}

/* ═══ BODY ═══ */
.gallery-body{
  flex:1;overflow-y:auto;padding:0 16px 80px;
  display:flex;flex-direction:column;gap:14px;
}

/* ═══ PROGRESS CARD ═══ */
.progress-card{
  background:var(--bg-normal);
  border-radius:14px;padding:16px;
  display:flex;flex-direction:column;gap:10px;
}
.progress-card-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;
}
.progress-character{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.progress-heart{
  width:38px;height:38px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;
}
.progress-heart svg{width:36px;height:36px}
.progress-heart-pct{
  position:absolute;font-size:10px;font-weight:700;color:var(--accent-pink);
  letter-spacing:-0.5px;
}
.progress-character-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.progress-character-name{
  font-size:14px;font-weight:600;color:var(--label-strong);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.progress-character-count{
  font-size:12px;color:var(--label-alternative);
  display:flex;align-items:center;gap:8px;
}
.progress-character-count .collected{color:var(--label-strong);font-weight:600}
.progress-character-count .locked{display:inline-flex;align-items:center;gap:3px}

.progress-bar{
  height:5px;border-radius:3px;
  background:rgba(255,255,255,0.06);overflow:hidden;
}
.progress-bar-fill{
  height:100%;border-radius:3px;
  background:linear-gradient(90deg,var(--accent-pink),var(--accent-violet));
  width:1%;transition:width 0.4s ease;
}

.progress-tiers{
  display:flex;flex-wrap:wrap;gap:10px 14px;
  font-size:11px;color:var(--label-alternative);
  padding-top:2px;
}
.progress-tier{display:inline-flex;align-items:center;gap:4px}
.progress-tier::before{
  content:'';width:6px;height:6px;border-radius:50%;
  background:var(--accent-cyan);
}
.progress-tier.normal::before{background:#3DC2FF}
.progress-tier.cutscene::before{background:var(--accent-pink)}
.progress-tier .tier-count{color:var(--label-strong);font-weight:600;margin-left:2px}

/* ═══ CATEGORY TABS ═══ */
.category-tabs{
  display:flex;gap:8px;overflow-x:auto;
  padding:2px 0 8px;
  scrollbar-width:none;
}
.category-tabs::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:8px 14px;border-radius:18px;
  border:1px solid var(--line-alternative);
  background:transparent;color:var(--label-alternative);
  font-size:13px;font-weight:500;cursor:pointer;
  font-family:inherit;
  transition:all 0.15s;
  display:inline-flex;align-items:center;gap:5px;
}
.cat-tab .cat-count{
  font-size:13px;font-weight:600;color:var(--label-strong);
}
.cat-tab.active{
  background:var(--label-strong);color:#1a1a1a;
  border-color:var(--label-strong);
}
.cat-tab.active .cat-count{color:#1a1a1a}

/* ═══ GRID ═══ */
.gallery-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}
@media (min-width:431px){
  .gallery-grid{grid-template-columns:repeat(3,1fr);gap:12px}
}
@media (min-width:768px){
  .gallery-grid{grid-template-columns:repeat(4,1fr);gap:14px}
}
@media (min-width:1024px){
  .gallery-grid{grid-template-columns:repeat(5,1fr);gap:16px}
}
.gallery-item{
  position:relative;aspect-ratio:3/4;
  border-radius:12px;overflow:hidden;
  background:var(--bg-normal);cursor:pointer;
  transition:transform 0.15s;
}
.gallery-item:active{transform:scale(0.98)}
.gallery-item img{
  width:100%;height:100%;object-fit:cover;display:block;
}
.gallery-item.locked img{filter:blur(20px) brightness(0.7)}
.gallery-item .lock-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;
}
.gallery-item .lock-price{
  display:inline-flex;align-items:center;gap:5px;
  padding:6px 12px;border-radius:999px;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.12);
  font-size:13px;font-weight:700;color:var(--label-strong);
  font-variant-numeric:tabular-nums;
}
.gallery-item .lock-price .mir-icon{
  width:14px;height:14px;
}
.gallery-item .tier-badge{
  position:absolute;top:8px;right:8px;
  padding:3px 7px;border-radius:6px;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(8px);
  font-size:10px;font-weight:600;color:var(--label-strong);
  letter-spacing:0.2px;
}
.gallery-item .tier-badge.cutscene{
  background:rgba(250,115,227,0.85);
}

/* ═══ UNLOCK MODAL ═══ */
.unlock-backdrop{
  position:fixed;inset:0;z-index:550;
  background:var(--material-dimmer);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
}
.unlock-backdrop.show{opacity:1;pointer-events:auto}
.unlock-modal{
  position:fixed;left:50%;top:50%;
  transform:translate(-50%,-50%) scale(0.95);
  z-index:560;
  width:calc(100% - 40px);max-width:400px;min-width:320px;
  background:var(--bg-elevated);
  border-radius:12px;padding:20px;
  box-shadow:0 12px 40px rgba(0,0,0,0.55);
  opacity:0;pointer-events:none;
  transition:opacity 0.2s ease-out, transform 0.2s cubic-bezier(0.4,0,0.2,1);
}
.unlock-modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.unlock-title{
  font-size:17px;font-weight:600;color:var(--label-strong);
  text-align:center;margin-bottom:8px;
}
.unlock-desc{
  font-size:13px;color:var(--label-alternative);
  text-align:center;line-height:1.6;margin-bottom:18px;
}
.unlock-price-pill{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 10px;border-radius:999px;
  background:var(--fill-alternative);
  color:var(--label-strong);font-weight:700;
  font-size:13px;
}
.unlock-price-pill img{width:13px;height:13px}
.unlock-actions{display:flex;gap:12px}
.unlock-btn{
  flex:1;padding:13px;border-radius:12px;border:none;
  font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;
  transition:all 0.15s;
}
.unlock-btn.no{background:var(--fill-alternative);color:var(--label-normal)}
.unlock-btn.no:active{background:var(--fill-normal)}
.unlock-btn.yes{
  background:linear-gradient(135deg,var(--primary-normal),var(--primary-heavy));
  color:#fff;font-weight:700;
}
.unlock-btn.yes:active{transform:scale(0.98);filter:brightness(0.95)}

/* ═══ VIEWER ═══ */
.viewer{
  position:fixed;inset:0;z-index:600;
  background:#000;
  display:flex;flex-direction:column;
  opacity:0;pointer-events:none;
  transition:opacity 0.25s ease;
}
.viewer.show{opacity:1;pointer-events:auto}
.viewer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:max(12px, env(safe-area-inset-top));
  background:rgba(0,0,0,0.4);position:relative;z-index:2;
}
.viewer-counter{
  font-size:15px;font-weight:600;color:var(--label-strong);
  font-variant-numeric:tabular-nums;
}
.viewer-close{
  width:32px;height:32px;border-radius:50%;border:none;
  background:transparent;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.viewer-body{
  flex:1;position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
.viewer-image{
  max-width:100%;max-height:100%;object-fit:contain;
  user-select:none;-webkit-user-drag:none;
}
.viewer-nav{
  position:absolute;top:50%;transform:translateY(-50%);
  width:42px;height:42px;border-radius:50%;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);
  border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:opacity 0.15s;
}
.viewer-nav.prev{left:12px}
.viewer-nav.next{right:12px}
.viewer-nav:disabled{opacity:0.3;pointer-events:none}
.viewer-nav:active{background:rgba(0,0,0,0.7)}

/* ═══ TOAST ═══ */
.toast{
  position:fixed;left:50%;top:90px;transform:translateX(-50%);
  padding:10px 24px;border-radius:12px;
  background:rgba(0,0,0,0.78);backdrop-filter:blur(12px);
  border:1px solid var(--line-alternative);
  font-size:13px;color:var(--label-strong);font-weight:500;
  opacity:0;transition:opacity 0.25s;pointer-events:none;
  z-index:700;white-space:nowrap;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="screen" id="app">
  <!-- Header -->
  <div class="gallery-header">
    <button class="gallery-back" aria-label="뒤로"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="gallery-title">갤러리</div>
    <button class="gallery-close" aria-label="닫기" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M6 18L18 6"/></svg></button>
  </div>

  <div class="gallery-body">
    <!-- Progress Card -->
    <div class="progress-card">
      <div class="progress-card-head">
        <div class="progress-character">
          <div class="progress-heart">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-pink)" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            <span class="progress-heart-pct" id="progressPct">1%</span>
          </div>
          <div class="progress-character-info">
            <div class="progress-character-name">셀린의 시크릿 컬렉션</div>
            <div class="progress-character-count">
              <span><span class="collected" id="collectedCount">1</span> / <span id="totalCount">85</span> 수집</span>
              <span class="locked">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <span id="lockedCount">84</span>장 미수집
              </span>
            </div>
          </div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-bar-fill" id="progressBar"></div></div>
      <div class="progress-tiers">
        <span class="progress-tier normal">일반 <span class="tier-count" id="normalCount">1/60</span></span>
        <span class="progress-tier cutscene">컷씬 <span class="tier-count" id="cutsceneCount">0/25</span></span>
      </div>
    </div>

    <!-- Category tabs -->
    <div class="category-tabs">
      <button class="cat-tab active" data-cat="all">전체 <span class="cat-count" id="tabAll">85</span></button>
      <button class="cat-tab" data-cat="normal">일반 <span class="cat-count" id="tabNormal">60</span></button>
      <button class="cat-tab" data-cat="cutscene">컷씬 <span class="cat-count" id="tabCutscene">25</span></button>
    </div>

    <!-- Grid -->
    <div class="gallery-grid" id="galleryGrid"></div>
  </div>
</div>

<!-- Viewer -->
<div class="viewer" id="viewer">
  <div class="viewer-header">
    <div class="viewer-counter"><span id="viewerCurrent">1</span> / <span id="viewerTotal">1</span></div>
    <button class="viewer-close" onclick="closeViewer()" aria-label="닫기"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M6 18L18 6"/></svg></button>
  </div>
  <div class="viewer-body">
    <button class="viewer-nav prev" id="viewerPrev" onclick="viewerNav(-1)" aria-label="이전"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <img class="viewer-image" id="viewerImage" alt="">
    <button class="viewer-nav next" id="viewerNext" onclick="viewerNav(1)" aria-label="다음"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
  </div>
</div>

<!-- Unlock confirm -->
<div class="unlock-backdrop" id="unlockBackdrop" onclick="closeUnlock()"></div>
<div class="unlock-modal" id="unlockModal">
  <div class="unlock-title" id="unlockTitle">이미지 해금하기</div>
  <div class="unlock-desc" id="unlockDesc"></div>
  <div class="unlock-actions">
    <button class="unlock-btn no" onclick="closeUnlock()">취소</button>
    <button class="unlock-btn yes" onclick="confirmUnlock()">해금</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══ DATA ═══
const TIER_LABELS = { normal:'일반', cutscene:'컷씬' };
const TIER_PRICE  = { normal:10, cutscene:30 };
const SAMPLE_IMAGES = [
  './images/char-iseol.png',
  './images/char-profile.png',
];
function makeItems(){
  const cats = [
    ['normal', 60],
    ['cutscene', 25],
  ];
  let id = 0;
  const items = [];
  cats.forEach(([cat, count]) => {
    for (let i = 0; i < count; i++) {
      items.push({
        id: id++,
        cat,
        img: SAMPLE_IMAGES[id % SAMPLE_IMAGES.length],
        unlocked: id === 1, // 첫 1개만 미리 해금
      });
    }
  });
  return items;
}
const ITEMS = makeItems();
let currentCat = 'all';
let viewerItems = [];
let viewerIdx = 0;
let pendingUnlockId = null;

// ═══ RENDER ═══
function render() {
  const grid = document.getElementById('galleryGrid');
  const filtered = currentCat === 'all' ? ITEMS : ITEMS.filter(i => i.cat === currentCat);
  grid.innerHTML = filtered.map(it => {
    const price = TIER_PRICE[it.cat];
    const lockHtml = it.unlocked ? '' : `
      <div class="lock-overlay">
        <div class="lock-price">
          <img src="./images/mir.png" alt="" class="mir-icon" onerror="this.style.display='none'">
          ${price}
        </div>
      </div>`;
    return `
      <div class="gallery-item ${it.unlocked ? '' : 'locked'}" data-id="${it.id}" onclick="onItemClick(${it.id})">
        <img src="${it.img}" alt="" onerror="this.style.background='var(--fill-normal)'">
        <span class="tier-badge ${it.cat}">${TIER_LABELS[it.cat]}</span>
        ${lockHtml}
      </div>
    `;
  }).join('');
  updateProgress();
}

function onItemClick(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item) return;
  if (item.unlocked) {
    openViewer(id);
  } else {
    askUnlock(id);
  }
}

function askUnlock(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item) return;
  pendingUnlockId = id;
  const price = TIER_PRICE[item.cat];
  const label = TIER_LABELS[item.cat];
  document.getElementById('unlockTitle').textContent = `${label} 이미지 해금하기`;
  document.getElementById('unlockDesc').innerHTML = `<span class="unlock-price-pill"><img src="./images/mir.png" alt="" onerror="this.style.display='none'"> ${price}</span> 미르를 사용해 즉시 해금합니다.`;
  document.getElementById('unlockModal').classList.add('show');
  document.getElementById('unlockBackdrop').classList.add('show');
}
function closeUnlock() {
  document.getElementById('unlockModal').classList.remove('show');
  document.getElementById('unlockBackdrop').classList.remove('show');
  pendingUnlockId = null;
}
function confirmUnlock() {
  if (pendingUnlockId == null) return;
  const item = ITEMS.find(i => i.id === pendingUnlockId);
  if (!item) return;
  item.unlocked = true;
  const id = pendingUnlockId;
  closeUnlock();
  render();
  setTimeout(() => openViewer(id), 200);
  showToast('🎉 해금 완료!');
}

function updateProgress() {
  const total = ITEMS.length;
  const collected = ITEMS.filter(i => i.unlocked).length;
  const locked = total - collected;
  const pct = Math.round((collected / total) * 100);
  document.getElementById('collectedCount').textContent = collected;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('lockedCount').textContent = locked;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressBar').style.width = Math.max(1, pct) + '%';

  // tier 카운트
  const counts = { normal:[0,0], cutscene:[0,0] };
  ITEMS.forEach(it => {
    counts[it.cat][1]++;
    if (it.unlocked) counts[it.cat][0]++;
  });
  document.getElementById('normalCount').textContent = `${counts.normal[0]}/${counts.normal[1]}`;
  document.getElementById('cutsceneCount').textContent = `${counts.cutscene[0]}/${counts.cutscene[1]}`;
  document.getElementById('tabAll').textContent = total;
  document.getElementById('tabNormal').textContent = counts.normal[1];
  document.getElementById('tabCutscene').textContent = counts.cutscene[1];
}

// ═══ TABS ═══
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    render();
  });
});

// ═══ VIEWER ═══
function openViewer(id) {
  const item = ITEMS.find(i => i.id === id);
  if (!item) return;
  if (!item.unlocked) {
    showToast('🔒 대화를 통해 해금할 수 있습니다');
    return;
  }
  // 해금된 것만 viewerItems
  viewerItems = ITEMS.filter(i => i.unlocked);
  viewerIdx = viewerItems.findIndex(i => i.id === id);
  showViewer();
}
function showViewer() {
  document.getElementById('viewer').classList.add('show');
  updateViewer();
}
function closeViewer() {
  document.getElementById('viewer').classList.remove('show');
}
function updateViewer() {
  const item = viewerItems[viewerIdx];
  document.getElementById('viewerImage').src = item.img;
  document.getElementById('viewerCurrent').textContent = viewerIdx + 1;
  document.getElementById('viewerTotal').textContent = viewerItems.length;
  document.getElementById('viewerPrev').disabled = viewerIdx === 0;
  document.getElementById('viewerNext').disabled = viewerIdx === viewerItems.length - 1;
}
function viewerNav(dir) {
  const newIdx = viewerIdx + dir;
  if (newIdx < 0 || newIdx >= viewerItems.length) return;
  viewerIdx = newIdx;
  updateViewer();
}

// ═══ TOAST ═══
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

// ═══ KEYBOARD ═══
document.addEventListener('keydown', (e) => {
  if (!document.getElementById('viewer').classList.contains('show')) return;
  if (e.key === 'Escape') closeViewer();
  if (e.key === 'ArrowLeft') viewerNav(-1);
  if (e.key === 'ArrowRight') viewerNav(1);
});

// init
render();
</script>
</body>
</html>
